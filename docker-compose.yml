services:
  db:
    image: postgres:16-alpine
    container_name: gospel-on-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gospel
      POSTGRES_PASSWORD: gospel1234
      POSTGRES_DB: gospelondb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gospel -d gospelondb"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: builder
    container_name: gospel-on-migrate
    command: npx prisma db push
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://gospel:gospel1234@db:5432/gospelondb"

  app:
    build: .
    container_name: gospel-on-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://gospel:gospel1234@db:5432/gospelondb"
      AUTH_SECRET: "${AUTH_SECRET:-gospel-on-secret-key-change-in-production}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_KAKAO_MAP_KEY: "${NEXT_PUBLIC_KAKAO_MAP_KEY:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_S3_BUCKET: "${AWS_S3_BUCKET:-}"
      AWS_REGION: "${AWS_REGION:-ap-northeast-2}"

volumes:
  pgdata:
